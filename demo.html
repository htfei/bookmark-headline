            transition: all 0.2s;

        }

        .filter-tab:hover {

            align-items: center;
            gap: 8px;
            flex-wrap: wrap;

        }

        let states = JSON.parse(JSON.stringify(mockData));
        let readArticles = new Set();
        let currentFilter = 'all';
        let currentFolder = 'all';
        let expandedCards = new Set();

        function formatUrl(url) {
            try {
                return new URL(url).host;
            } catch {
                return url;
            }
        }

        function getUnreadCount() {
            let count = 0;
            states.forEach(state => {
                if ((currentFolder === 'all' || state.folderId === currentFolder)) {
                    state.articles.forEach(article => {
                        if (!readArticles.has(article.url)) count++;
                    });
                }
            });
            return count;
        }

        function updateBadge() {
            document.getElementById('unreadBadge').textContent = getUnreadCount();
        }

        function renderCard(state) {
            const card = document.createElement('div');
            card.className = 'site-card';
            card.dataset.id = state.id;

            const header = document.createElement('div');
            header.className = 'site-header';
            header.innerHTML = `
                <img src="https://www.google.com/s2/favicons?domain=${formatUrl(state.url)}&sz=32" 
                     class="site-favicon" 
                     onerror="this.style.display='none'">
                <div class="site-info">
                    <div class="site-title">${state.title}</div>
                    <div class="site-domain">${formatUrl(state.url)}</div>
                </div>
            `;
            card.appendChild(header);

            const articlesList = document.createElement('div');
            articlesList.className = 'articles-list';

            const maxDisplay = 5;
            const displayArticles = expandedCards.has(state.id) 
                ? state.articles 
                : state.articles.slice(0, maxDisplay);

            displayArticles.forEach((article, index) => {
                const isRead = readArticles.has(article.url);
                const item = document.createElement('div');
                item.className = `article-item ${index === 0 ? 'large' : 'small'} ${isRead ? 'read' : ''}`;
                item.onclick = () => {
                    readArticles.add(article.url);
                    item.classList.add('read');
                    updateBadge();
                };
                item.innerHTML = `
                    <img src="${article.image}" class="article-image" onerror="this.style.display='none'">
                    <div class="article-content">
                        <div class="article-title">${article.title}</div>
                    </div>
                    <svg class="article-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 6H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"></path>
                        <path d="M14 4h6m0 0v6m0-6L10 14"></path>
                    </svg>
                `;
                articlesList.appendChild(item);
            });

            card.appendChild(articlesList);

            if (state.articles.length > maxDisplay) {
                const expandBtn = document.createElement('button');
                expandBtn.className = 'expand-btn';
                expandBtn.textContent = expandedCards.has(state.id) 
                    ? '▲ 收起' 
                    : `▼ 展开更多（还有${state.articles.length - maxDisplay}条）`;
                expandBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (expandedCards.has(state.id)) {
                        expandedCards.delete(state.id);
                    } else {
                        expandedCards.add(state.id);
                    }
                    render();
                };
                card.appendChild(expandBtn);
            }

            return card;
        }

        function render() {
            const waterfall = document.getElementById('waterfall');
            const emptyState = document.getElementById('emptyState');
            waterfall.innerHTML = '';

            let filtered = states.filter(state => {
                if (currentFolder !== 'all' && state.folderId !== currentFolder) return false;
                if (currentFilter === 'unread') {
                    return state.articles.some(a => !readArticles.has(a.url));
                }
                return true;
            });

            if (filtered.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                filtered.forEach(state => {
                    waterfall.appendChild(renderCard(state));
                });
            }

            updateBadge();
        }

        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                render();
            });
        });

        document.querySelectorAll('.folder-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFolder = btn.dataset.folder;
                render();
            });
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            btn.disabled = true;
            icon.className = 'spinner';
            
            setTimeout(() => {
                icon.className = '';
                icon.textContent = '🔄';
                btn.disabled = false;
                
                document.getElementById('newItemsBar').style.display = 'block';
            }, 1500);
        });

        document.getElementById('markAllBtn').addEventListener('click', () => {
            states.forEach(state => {
                state.articles.forEach(article => {
                    readArticles.add(article.url);
                });
            });
            render();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('确定要清空所有项目吗？')) {
                states = [];
                readArticles.clear();
                render();
            }
        });

        document.getElementById('showNewBtn').addEventListener('click', () => {
            document.getElementById('newItemsBar').style.display = 'none';
        });

        document.getElementById('closeNewBtn').addEventListener('click', () => {
            document.getElementById('newItemsBar').style.display = 'none';
        });

        render();
    </script>
</body>
</html>
